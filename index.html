<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Warsaw Days '26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root{
    --bg:#FFFFFF; --soft:#F2F2F0; --card:#FFFFFF; --ink:#16161A; --mut:#8A8A8E;
    --line:#ECEAE5; --black:#161616; --gold:#F5B301; --red:#FF4D4F; --head:172px;
    --c-museum:#7E6BA0; --c-park:#4E7C57; --c-shop:#C2823E;
    --c-cafe:#9B6A45; --c-resto:#B0514A; --c-food:#3F7D86;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);
    font-family:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  svg{display:block}

  header{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.96);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
  .htop{padding:18px 20px 11px}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .hrow h1{font-size:25px;font-weight:800;letter-spacing:-.02em;line-height:1.02;flex:1}
  .hicons{display:flex;align-items:center;gap:8px;flex:none}
  .hbtn{position:relative;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);
    background:var(--card);display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--ink);flex:none}
  .hbtn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.9}
  .hbtn .cnt{position:absolute;top:-3px;right:-3px;min-width:18px;height:18px;border-radius:9px;
    background:var(--red);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;
    justify-content:center;padding:0 4px;opacity:0;transition:.15s}
  .hbtn.has .cnt{opacity:1}
  /* search overlay */
  .search-wrap{overflow:hidden;max-height:0;opacity:0;transition:max-height .3s ease,opacity .25s ease;margin-top:0}
  .search-wrap.open{max-height:64px;opacity:1;margin-top:10px}
  .search{display:flex;align-items:center;gap:10px;background:var(--soft);
    border-radius:15px;padding:0 13px;height:48px}
  .search svg{width:19px;height:19px;flex:none;fill:none;stroke:var(--mut);stroke-width:1.9}
  .search input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:15px;color:var(--ink)}
  .filters{display:flex;gap:8px;margin-top:12px;overflow-x:auto;scrollbar-width:none;padding:0 0 2px}
  .filters::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;
    color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:999px;
    padding:8px 15px;transition:.15s;min-height:38px}
  .chip .ct{color:var(--mut);font-weight:600;font-size:12px;margin-left:3px}
  .chip.on{color:#fff;border-color:transparent}
  .chip.on .ct{color:rgba(255,255,255,.75)}

  .split{display:block}
  .list{padding:16px 20px calc(110px + env(safe-area-inset-bottom))}
  .seclab{font-size:16px;font-weight:800;letter-spacing:-.01em;margin:6px 2px 13px;display:flex;align-items:baseline;gap:8px}
  .seclab .n{font-size:12.5px;color:var(--mut);font-weight:600}

  /* featured carousel */
  .featured{display:flex;gap:13px;overflow-x:auto;scrollbar-width:none;padding:1px 2px 18px;scroll-snap-type:x mandatory}
  .featured::-webkit-scrollbar{display:none}
  .fcard{flex:none;width:74%;max-width:300px;aspect-ratio:5/4;border-radius:20px;overflow:hidden;position:relative;
    border:none;cursor:pointer;scroll-snap-align:start;background:var(--line)}
  .fcard img{width:100%;height:100%;object-fit:cover}
  .fov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 38%,rgba(0,0,0,.62) 100%)}
  .fbadge{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.92);color:var(--ink);
    font-size:11px;font-weight:700;padding:5px 11px;border-radius:999px}
  .ftext{position:absolute;left:14px;right:14px;bottom:13px;text-align:left;color:#fff}
  .fname{font-size:19px;font-weight:800;letter-spacing:-.01em;line-height:1.1}
  .farea{font-size:12.5px;margin-top:3px;opacity:.92;font-weight:600}
  .farea .st{color:var(--gold)}

  .lgrid{display:flex;flex-direction:column;gap:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 8px 26px -20px rgba(20,20,25,.55)}
  .ph{position:relative;aspect-ratio:3/2;overflow:hidden;background:var(--line);cursor:pointer}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;transition:.5s}
  .ph:active img{transform:scale(1.03)}
  .heart{position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:50%;border:none;
    background:rgba(255,255,255,.94);display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 4px 12px -4px rgba(0,0,0,.3);line-height:0;padding:0}
  .heart svg{width:18px;height:18px;fill:none;stroke:#16161A;stroke-width:2;transition:.15s;flex:none}
  .heart.on svg{fill:var(--red);stroke:var(--red)}
  .body{padding:15px 16px 16px;display:flex;flex-direction:column;flex:1}
  .name{font-size:18.5px;font-weight:800;letter-spacing:-.01em;line-height:1.18;margin-bottom:7px}
  .meta{font-size:13px;color:var(--mut);font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .meta .star{color:var(--gold);font-weight:700}
  .meta .rt{color:var(--ink);font-weight:700}
  .meta .dot{opacity:.45}
  .meta .walk{color:var(--c-park);font-weight:700}
  .desc{font-size:14px;color:#3d3d42;margin-bottom:11px}
  .pick{font-size:13.5px;margin-bottom:12px}
  .pick b{color:var(--ink);font-weight:700}
  .long{max-height:0;overflow:hidden;opacity:0;transition:max-height .4s ease,opacity .3s ease}
  .card.open .long{max-height:560px;opacity:1;margin-bottom:13px}
  .long p{font-size:13.5px;color:#3d3d42;line-height:1.6}
  .more{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--ink);
    background:none;border:none;cursor:pointer;font-family:inherit;padding:0;margin-bottom:13px;text-decoration:underline;text-underline-offset:3px}
  .more .ar{transition:transform .3s;text-decoration:none;display:inline-block}
  .card.open .more .ar{transform:rotate(180deg)}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .badge{font-size:11.5px;color:var(--mut);border:1px solid var(--line);border-radius:8px;padding:4px 9px;background:var(--soft);font-weight:600}
  .spacer{flex:1}
  .actions{display:flex;gap:10px;margin-top:auto}
  .btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:46px;
    font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border-radius:13px;text-decoration:none;transition:.15s}
  .btn-map{background:var(--black);color:#fff;border:none}
  .btn-map:active{transform:scale(.98)}
  .btn-go{background:var(--card);color:var(--ink);border:1px solid var(--line)}

  .empty{display:none;text-align:center;color:var(--mut);font-size:14px;font-weight:600;padding:50px 20px}

  /* map */
  .mapcol{position:fixed;left:0;right:0;top:var(--head);bottom:0;display:none}
  body.map-active .mapcol{display:block}
  body.map-active .list{display:none}
  #map{width:100%;height:100%;z-index:1}
  .pin span{display:block;width:18px;height:18px;border-radius:50%;background:var(--pc);
    border:3px solid #fff;box-shadow:0 2px 7px rgba(20,20,25,.45);transition:transform .15s}
  .pin.active span{transform:scale(1.5);box-shadow:0 4px 13px rgba(20,20,25,.6)}
  .leaflet-popup-content-wrapper{border-radius:18px;padding:0;overflow:hidden;box-shadow:0 16px 44px -14px rgba(20,20,25,.5)}
  .leaflet-popup-content{margin:0;width:260px!important}
  .pop img{width:100%;height:140px;object-fit:cover;display:block}
  .pop-b{padding:13px 14px 14px}
  .pop-name{font-size:17px;font-weight:800;line-height:1.18;margin-bottom:4px;color:var(--ink)}
  .pop-rate{font-size:12.5px;color:var(--mut);font-weight:600}
  .pop-rate .st{color:var(--gold)}
  .pop-cat{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
  .pop-pick{font-size:12.5px;color:#3d3d42;margin:8px 0 10px;line-height:1.45}
  .pop-pick b{color:var(--ink);font-weight:700}
  .pop-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
  .pop-badge{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:6px;padding:2px 7px;background:var(--soft);font-weight:600}
  .pop a{display:block;text-align:center;font-size:13px;font-weight:700;color:#fff;background:var(--black);
    text-decoration:none;padding:9px;border-radius:11px}

  /* floating dock (mobile) — тумблер по центру */
  .dock{position:fixed;left:0;right:0;bottom:0;z-index:1100;display:flex;align-items:center;justify-content:center;
    padding:10px 18px calc(14px + env(safe-area-inset-bottom));pointer-events:none}
  .dockbar{pointer-events:auto;display:flex;align-items:center;gap:2px;background:var(--black);
    border-radius:999px;padding:5px;box-shadow:0 12px 32px -10px rgba(0,0,0,.55)}
  .dtab{display:flex;align-items:center;gap:7px;border:none;background:none;cursor:pointer;font-family:inherit;
    color:rgba(255,255,255,.65);font-size:14px;font-weight:700;padding:10px 20px;border-radius:999px;transition:.2s;white-space:nowrap}
  .dtab svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.9}
  .dtab.on{background:#fff;color:var(--black)}

  @media(min-width:1000px){
    .dock{display:none}
    .htop{padding:20px 32px 12px}
    .hrow h1{font-size:30px}
    .search,.filters{max-width:900px}
    .split{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);align-items:start}
    .list{padding:22px 32px 60px}
    .lgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .mapcol{position:sticky;left:auto;right:auto;top:var(--head);bottom:auto;
      height:calc(100vh - var(--head));display:block}
    body.map-active .list{display:block}
    .fcard{width:300px}
  }
  @media(min-width:1480px){.lgrid{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>

<header>
  <div class="htop">
    <div class="hrow">
      <h1>Warsaw Days '26</h1>
      <div class="hicons">
        <button class="hbtn" id="searchBtn" title="Поиск">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7.5"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        <button class="hbtn" id="savedBtn" title="Сохранённые">
          <svg viewBox="0 0 24 24"><path d="M12 21C12 21 3.5 15.5 3.5 9.5C3.5 7 5.5 5 8 5C9.5 5 10.8 5.8 12 7C13.2 5.8 14.5 5 16 5C18.5 5 20.5 7 20.5 9.5C20.5 15.5 12 21 12 21Z"/></svg>

      </div>

    <div class="filters" id="filters"></div>
  </div>
</header>

<div class="split">
  <div class="list">
    <div class="seclab">Все места <span class="n" id="cnt"></span></div>

    <div class="empty" id="empty">Ничего не найдено</div>

  <div class="mapcol"><div id="map"></div></div>
</div>

<nav class="dock">
  <div class="dockbar" id="dockbar">
    <button class="dtab on" id="tabList">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      Список</button>

      Карта</button>
  </div>
</nav>

const fbar=document.getElementById('filters');
const state={cat:"all",q:""};
const saved=new Set(JSON.parse(localStorage.getItem('waw_saved')||'[]'));

function chip(key,label,hex){
  const b=document.createElement('button');
  b.className='chip'+(key==='all'?' on':'');
  b.dataset.k=key; b.dataset.hex=hex||'#161616';
  const n=key==='all'?P.length:P.filter(p=>p.cat===key).length;
  b.innerHTML=label+` <span class="ct">${n}</span>`;
  b.onclick=()=>{state.cat=key;syncChips();applyFilters();};
  fbar.appendChild(b);
}
chip('all','Все','#161616');
Object.entries(CATS).forEach(([k,c])=>chip(k,c.label,c.hex));

function syncChips(){
  document.querySelectorAll('.chip').forEach(c=>{
    const on=c.dataset.k===state.cat;
    c.classList.toggle('on',on);
    c.style.background=on?c.dataset.hex:'';
    c.style.borderColor=on?c.dataset.hex:'';
  });
}
syncChips();


/* map */
const map=L.map('map',{scrollWheelZoom:false}).setView([52.235,21.01],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:20}).addTo(map);
const layer=L.layerGroup().addTo(map);
const markers=P.map((p,i)=>{
  const c=CATS[p.cat];
  const m=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'pin',
    html:`<span style="--pc:${c.hex}"></span>`,iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-9]})});
  const rt=p.rate?`<span class="st">★</span> ${p.rate.toFixed(1)} · `:'';
  const bdg=p.badges.slice(0,2).map(b=>`<span class="pop-badge">${b}</span>`).join('');
  m.bindPopup(`<div class="pop">
    <img src="${p.img}" alt="" onerror="this.style.display='none'">
    <div class="pop-b">
      <div class="pop-cat" style="color:${c.hex}">${c.label}</div>
      <div class="pop-name">${p.name}</div>
      <div class="pop-rate">${rt}${p.area}</div>
      <div class="pop-pick">${p.pick}</div>
      ${bdg?`<div class="pop-badges">${bdg}</div>`:''}
      <a href="${p.url}" target="_blank" rel="noopener">Маршрут →</a>
    </div></div>`,{maxWidth:260});
  m.on('click',()=>focusCard(i));
  return m;
});

/* cards */
const grid=document.getElementById('lgrid');
const cards=P.map((p,i)=>{
  const c=CATS[p.cat];
  const rate=p.rate?`<span class="star">★</span><span class="rt">${p.rate.toFixed(1)}</span>`:`<span class="walk">Прогулка</span>`;
  const el=document.createElement('article');el.className='card';el.dataset.i=i;
  el.innerHTML=`<div class="ph">
      <img loading="lazy" src="${p.img}" alt="${p.name}"
        onerror="this.parentElement.style.background='var(--line)';this.style.display='none'">
      <button class="heart" aria-label="Сохранить">
        <svg viewBox="0 0 24 24"><path d="M12 21C12 21 3.5 15.5 3.5 9.5C3.5 7 5.5 5 8 5C9.5 5 10.8 5.8 12 7C13.2 5.8 14.5 5 16 5C18.5 5 20.5 7 20.5 9.5C20.5 15.5 12 21 12 21Z"/></svg>
      </button></div>
    <div class="body"><div class="name">${p.name}</div>
      <div class="meta">${rate}<span class="dot">·</span>${c.label}<span class="dot">·</span>${p.area}</div>
      <div class="desc">${p.desc}</div><div class="pick">${p.pick}</div>
      <div class="long"><p>${p.long}</p></div>
      <button class="more">Подробнее <span class="ar">▾</span></button>
      <div class="badges">${p.badges.map(b=>`<span class="badge">${b}</span>`).join('')}</div>
      <div class="actions">
        <button class="btn btn-map">На карте</button>
        <a class="btn btn-go" href="${p.url}" target="_blank" rel="noopener">Маршрут</a>
      </div></div>`;
  el.querySelector('.ph').addEventListener('click',e=>{if(e.target.closest('.heart'))return;gotoMap(i);});
  el.querySelector('.btn-map').addEventListener('click',()=>gotoMap(i));
  el.querySelector('.more').addEventListener('click',function(){
    const open=el.classList.toggle('open');this.childNodes[0].nodeValue=open?'Свернуть ':'Подробнее ';
  });
  if(saved.has(i))el.querySelector('.heart').classList.add('on');
  el.querySelector('.heart').addEventListener('click',function(e){
    e.stopPropagation();
    if(saved.has(i)){saved.delete(i);this.classList.remove('on');}else{saved.add(i);this.classList.add('on');}
    updateSaved(); if(state.cat==='saved')applyFilters();
  });
  el.addEventListener('mouseenter',()=>{const mk=markers[i];if(mk._icon)mk._icon.classList.add('active')});
  el.addEventListener('mouseleave',()=>{const mk=markers[i];if(mk._icon)mk._icon.classList.remove('active')});
  grid.appendChild(el);return el;
});

/* filtering */
const cntEl=document.getElementById('cnt'),emptyEl=document.getElementById('empty');

function applyFilters(){
  const q=state.q.trim().toLowerCase();
  layer.clearLayers();const b=[];let n=0;
  P.forEach((p,i)=>{
    const inCat = state.cat==='all' ? true : (state.cat==='saved'? saved.has(i) : p.cat===state.cat);
    const hay=(p.name+' '+p.area+' '+CATS[p.cat].label+' '+p.desc+' '+p.long).toLowerCase();
    const inQ = !q || hay.includes(q);
    const show=inCat&&inQ;
    cards[i].style.display=show?'':'none';
    if(show){markers[i].addTo(layer);b.push([p.lat,p.lng]);n++;}
  });
  if(b.length)map.fitBounds(b,{padding:[44,44],maxZoom:15});
  const plain=(state.cat==='all'&&!q);

  cntEl.textContent=n; emptyEl.style.display=n?'none':'block';
  emptyEl.textContent=(state.cat==='saved'&&!saved.size)?'Пока ничего не сохранено — жмите ♥ на карточках':'Ничего не найдено';
}

/* search */
document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value;applyFilters();});
document.getElementById('searchBtn').addEventListener('click',()=>{
  const w=document.getElementById('searchWrap');
  const opening=!w.classList.contains('open');
  w.classList.toggle('open');
  if(opening)setTimeout(()=>document.getElementById('q').focus(),320);
  else{document.getElementById('q').value='';state.q='';applyFilters();}
  measureHead();
});
/* сброс через фильтр 'Все' */

/* saved */
function updateSaved(){
  localStorage.setItem('waw_saved', JSON.stringify([...saved]));
  const b=document.getElementById('savedBtn');b.classList.toggle('has',saved.size>0);
  document.getElementById('savedCnt').textContent=saved.size;}
document.getElementById('savedBtn').addEventListener('click',()=>{
  state.cat = state.cat==='saved' ? 'all' : 'saved';
  syncChips();applyFilters();
  showMap(false);
  window.scrollTo({top:0,behavior:'smooth'});
});

/* view toggle */
const mq=()=>window.matchMedia('(max-width:999px)').matches;
function showMap(on){
  document.body.classList.toggle('map-active',on);
  document.getElementById('tabList').classList.toggle('on',!on);
  document.getElementById('tabMap').classList.toggle('on',on);
  measureHead(); if(on)setTimeout(()=>map.invalidateSize(),90);
}
document.getElementById('tabList').addEventListener('click',()=>{
  showMap(false);
});
document.getElementById('tabMap').addEventListener('click',()=>{
  showMap(true);
});

function gotoMap(i){
  if(mq())showMap(true);
  setTimeout(()=>{map.invalidateSize();map.flyTo([P[i].lat,P[i].lng],16,{duration:.7});markers[i].openPopup();},mq()?260:0);
}
function focusCard(i){
  if(mq()){
    // на мобайле остаёмся на карте — попап уже открыт через m.on('click')
    return;
  }
  // десктоп — подсвечиваем карточку в списке
  const el=cards[i];
  el.scrollIntoView({behavior:'smooth',block:'center'});
  el.style.transition='box-shadow .3s';
  el.style.boxShadow='0 0 0 2px var(--black)';
  setTimeout(()=>el.style.boxShadow='',1300);
}

function measureHead(){document.documentElement.style.setProperty('--head',document.querySelector('header').offsetHeight+'px');}
window.addEventListener('load',measureHead);window.addEventListener('resize',measureHead);
map.on('click',()=>map.scrollWheelZoom.enable());
updateSaved();applyFilters();measureHead();
</script>
</body>
</html>
